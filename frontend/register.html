<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register - FoodExpress</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div id="navbar"></div>

<div class="form-box">
    <h2>Create Account</h2>
    <form id="registerForm">
        <div class="form-group">
            <label for="regName">Full Name</label>
            <input type="text" id="regName" required>
        </div>
        <div class="form-group">
            <label for="regEmail">Email</label>
            <input type="email" id="regEmail" required>
        </div>
        <div class="form-group">
            <label for="regPhone">Phone Number</label>
            <input type="tel" id="regPhone" pattern="[0-9]{10}" placeholder="10-digit phone number">
        </div>
        <div class="form-group">
            <label for="regPassword">Password</label>
            <input type="password" id="regPassword" minlength="6" required>
        </div>
        <button type="submit" class="btn btn-block">Register</button>
        <p class="form-msg" id="formMsg"></p>
    </form>
    <p class="form-footer-text">Already have an account? <a href="login.html">Login here</a></p>
</div>

<div id="footer"></div>

<script src="js/common.js"></script>
<script src="js/auth.js"></script>
</body>
</html>
