<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Checkout - FoodExpress</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div id="navbar"></div>

<section class="section">
    <div class="container">
        <h2 class="section-title">Checkout</h2>

        <div class="checkout-wrapper">
            <div class="form-box" style="margin:0;">
                <h2>Delivery Details</h2>
                <form id="checkoutForm">
                    <div class="form-group">
                        <label for="address">Delivery Address</label>
                        <textarea id="address" rows="3" required></textarea>
                    </div>
                    <div class="form-group">
                        <label for="phone">Phone Number</label>
                        <input type="tel" id="phone" pattern="[0-9]{10}" placeholder="10-digit phone number" required>
                    </div>
                    <div class="form-group">
                        <label for="paymentMethod">Payment Method</label>
                        <select id="paymentMethod" required>
                            <option value="Cash on Delivery">Cash on Delivery</option>
                            <option value="Card">Credit / Debit Card</option>
                            <option value="UPI">UPI</option>
                        </select>
                    </div>
                    <button type="submit" class="btn btn-block">Place Order</button>
                    <p class="form-msg" id="formMsg"></p>
                </form>
            </div>

            <div class="order-summary-box">
                <h3 class="mt-20" style="margin-bottom:15px;">Order Summary</h3>
                <div id="orderSummary"></div>
            </div>
        </div>
    </div>
</section>

<div id="footer"></div>

<script src="js/menu-data.js"></script>
<script src="js/common.js"></script>
<script src="js/cart.js"></script>
<script src="js/checkout.js"></script>
</body>
</html>
